<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Premium Dark Espresso Circular Background -->
  <circle cx="256" cy="256" r="240" fill="#1C120C" stroke="#C8A276" stroke-width="10"/>
  
  <!-- Steaming Coffee Cup & Bean Icon (Luxurious Gold Line Art) -->
  <g transform="translate(128, 115)" stroke="#C8A276" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Steam waves -->
    <path d="M96 48 C96 20, 112 20, 112 0" />
    <path d="M128 48 C128 20, 144 20, 144 0" />
    <path d="M160 48 C160 20, 176 20, 176 0" />
    
    <!-- Cup Body -->
